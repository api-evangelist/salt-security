aid: salt-security
url: https://raw.githubusercontent.com/api-evangelist/salt-security/refs/heads/main/apis.yml
name: Salt Security
description: >-
  Salt Security provides an AI-powered API security platform that discovers all APIs,
  stops API attacks in real-time, and provides remediation insights. The platform
  delivers full lifecycle API security through API discovery, posture governance, and
  advanced threat protection using patented AI and ML technology. Salt Security
  announced an Agentic AI Security platform and MCP Discovery capabilities in 2026.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - API Security
  - AI
  - API Discovery
  - Posture Governance
  - Threat Protection
  - Security
access: 3rd-Party
created: '2025-01-08'
modified: '2026-05-02'
x-profiled: '2026-05'
specificationVersion: '0.19'
apis:
  - aid: salt-security:salt-security-platform
    name: Salt Security API Protection Platform
    description: >-
      The Salt Security API Protection Platform provides full lifecycle API security
      including automated API discovery, posture governance, real-time threat protection,
      and remediation insights. It uses AI and machine learning to automatically discover
      all APIs (including shadow and zombie APIs), identify vulnerabilities, stop attacks,
      and provide developer-friendly remediation guidance.
    humanURL: https://salt.security/api-security-platform
    tags:
      - API Discovery
      - API Security
      - Posture Governance
      - Threat Protection
      - AI
    properties:
      - url: https://salt.security/api-security-platform
        type: Documentation
      - url: https://salt.security/use-cases/discover-all-apis
        type: APIDiscovery
      - url: https://salt.security/use-cases/prevent-attacks
        type: ThreatProtection
      - url: https://salt.security/use-cases/improve-api-security-posture
        type: PostureGovernance

  - aid: salt-security:salt-developer-portal-api
    name: Salt Security Developer Portal API
    description: >-
      The Salt Security Developer Portal provides REST APIs for automating API security
      practices. The portal offers comprehensive documentation with request/response
      structures, parameters, authentication flows, built-in testing tools, and
      ready-to-use code samples for integrating with the Salt API Protection Platform.
    humanURL: https://salt.security/blog/introducing-the-salt-developer-portal-unleash-the-power-of-automating-api-security
    tags:
      - Automation
      - Integration
      - REST API
      - Developer Portal
    properties:
      - url: https://salt.security/blog/introducing-the-salt-developer-portal-unleash-the-power-of-automating-api-security
        type: Documentation

